name: Daily Model Retraining

on:
  # Schedule removed — trigger manually from the Actions tab when needed
  # To re-enable daily retraining uncomment the lines below:
  # schedule:
  #   - cron: "0 6 * * 1-5"

  workflow_dispatch:
    inputs:
      run_tuning:
        description: "Run Optuna hyperparameter tuning?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      n_trials:
        description: "Number of Optuna trials (if tuning enabled)"
        required: false
        default: "20"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train models
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO:     ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN:    ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.run_tuning }}" = "true" ]; then
            echo "Running with Optuna tuning (${{ github.event.inputs.n_trials }} trials)..."
            python train.py --tune --trials ${{ github.event.inputs.n_trials }}
          else
            echo "Running without tuning (default parameters)..."
            python train.py
          fi

      - name: Commit updated model files
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add models/

          if git diff --staged --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "🤖 Auto-retrain: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Model files committed and pushed."
          fi
